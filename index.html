<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Simple Cash Book</title>
  <link rel="manifest" href="/tools/manifest.json">
  <meta name="theme-color" content="#ffffff">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #f5f5f5;
      color: #1A1A1A;
      padding: 20px;
      min-height: 100vh;
    }

    .app-container {
      max-width: 640px;
      margin: 0 auto;
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      overflow: visible;
    }

    /* Header - clean, minimal */
    .header {
      background: transparent;
      padding: 8px 0 24px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: none;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: none;
      color: #1A1A1A;
      -webkit-background-clip: unset;
    }
    .back-btn {
      background: white;
      border: none;
      font-size: 24px;
      width: 44px;
      height: 44px;
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
      color: #1A1A1A;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), 0 0 0 1px rgba(0, 0, 0, 0.02);
    }
    .back-btn:active {
      background: #f0f0f0;
      transform: scale(0.96);
    }
    .spacer { flex: 1; }

    .view {
      padding: 0 0 32px 0;
      display: none;
      animation: fadeInUp 0.3s ease;
    }
    .active-view { display: block; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Cards - CRED style white minimal */
    .card {
      background: #ffffff;
      border-radius: 32px;
      padding: 28px 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(0, 0, 0, 0.02);
      transition: transform 0.1s ease;
    }

    /* Dashboard Buttons */
    .dashboard-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 16px;
    }
    .btn-large {
      background: white;
      border: none;
      padding: 22px 20px;
      border-radius: 28px;
      font-size: 20px;
      font-weight: 590;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #1A1A1A;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), 0 0 0 1px rgba(0, 0, 0, 0.03);
      letter-spacing: -0.2px;
    }
    .btn-large:active {
      background: #f9f9f9;
      transform: scale(0.98);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
    }

    /* Primary button - mint green accent */
    .btn-primary {
      background: #00D09C;
      border: none;
      color: white;
      padding: 16px 24px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 17px;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      letter-spacing: -0.2px;
    }
    .btn-primary:active {
      background: #00b888;
      transform: scale(0.97);
    }
    .btn-secondary {
      background: #f2f2f2;
      color: #1A1A1A;
      border: none;
      padding: 12px 20px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-secondary:active {
      background: #e5e5e5;
      transform: scale(0.96);
    }

    .flex-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 16px 20px;
      border-radius: 28px;
      border: 1px solid #eaeaea;
      background: white;
      font-size: 16px;
      margin-bottom: 20px;
      transition: all 0.2s;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #00D09C;
      box-shadow: 0 0 0 4px rgba(0, 208, 156, 0.1);
    }
    label {
      font-weight: 510;
      margin-bottom: 8px;
      display: inline-block;
      font-size: 14px;
      color: #666;
      letter-spacing: -0.2px;
    }
    .radio-group {
      display: flex;
      gap: 28px;
      align-items: center;
      margin-bottom: 24px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      color: #1A1A1A;
    }

    /* Summary Card - premium */
    .summary-card {
      background: white;
      border-radius: 32px;
      padding: 28px 24px;
      text-align: center;
      margin-bottom: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(0, 0, 0, 0.02);
    }
    .balance-number {
      font-size: 48px;
      font-weight: 700;
      color: #1A1A1A;
      letter-spacing: -1px;
      margin: 12px 0;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      font-weight: 500;
      font-size: 15px;
      color: #444;
    }

    /* Transaction list - single column, clean */
    .txn-list {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 520px;
      overflow-y: auto;
    }
    .txn-item {
      background: white;
      border-radius: 24px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), 0 0 0 1px rgba(0, 0, 0, 0.02);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .txn-item:active {
      background: #fefefe;
      transform: scale(0.99);
    }
    .txn-left {
      flex: 2;
      min-width: 150px;
    }
    .txn-name {
      font-weight: 600;
      font-size: 17px;
      color: #1A1A1A;
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }
    .txn-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 13px;
      color: #888;
    }
    .txn-amount {
      font-size: 22px;
      font-weight: 650;
      text-align: right;
      flex-shrink: 0;
      letter-spacing: -0.3px;
    }
    .txn-amount.in { color: #00D09C; }
    .txn-amount.out { color: #FF6B4A; }

    .title-section {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 18px;
      color: #1A1A1A;
      letter-spacing: -0.3px;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1A1A1A;
      color: white;
      padding: 14px 28px;
      border-radius: 60px;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      font-weight: 500;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      align-items: center;
      justify-content: center;
      z-index: 1100;
      backdrop-filter: blur(4px);
    }
    .modal-card {
      background: white;
      max-width: 90%;
      width: 360px;
      border-radius: 40px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #aaa;
      font-size: 15px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <button class="back-btn" id="globalBackBtn" style="display: none;">←</button>
    <h1>Simple Cash Book</h1>
    <div class="spacer"></div>
  </div>

  <!-- WELCOME -->
  <div id="welcomeView" class="view">
    <div class="card">
      <label>Enter your name</label>
      <input type="text" id="userNameInput" placeholder="e.g., Deepak Sharma" autocomplete="off">
      <button class="btn-primary" id="continueBtn">Continue →</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardView" class="view">
    <div class="dashboard-buttons">
      <button class="btn-large" id="seeDetailsBtn">📊 See Details</button>
      <button class="btn-large" id="paymentInBtn">💰 Payment In</button>
      <button class="btn-large" id="paymentOutBtn">💸 Payment Out</button>
    </div>
  </div>

  <!-- PAYMENT IN -->
  <div id="paymentInView" class="view">
    <div class="card">
      <label>Date</label>
      <input type="date" id="inDate">
      <label>Name</label>
      <input type="text" id="inName" placeholder="Person or entity">
      <label>Amount (₹)</label>
      <input type="number" id="inAmount" step="0.01" min="0.01">
      <label>Reason (optional)</label>
      <input type="text" id="inReason" placeholder="Reason for payment">
      <label>Payment Mode</label>
      <div class="radio-group">
        <label><input type="radio" name="inMode" value="Cash" checked> Cash</label>
        <label><input type="radio" name="inMode" value="Online"> Online</label>
      </div>
      <button class="btn-primary" id="saveInBtn">Save Payment In</button>
    </div>
  </div>

  <!-- PAYMENT OUT -->
  <div id="paymentOutView" class="view">
    <div class="card">
      <label>Date</label>
      <input type="date" id="outDate">
      <label>Name</label>
      <input type="text" id="outName" placeholder="Person or entity">
      <label>Amount (₹)</label>
      <input type="number" id="outAmount" step="0.01" min="0.01">
      <label>Reason (optional)</label>
      <input type="text" id="outReason" placeholder="Reason for payment">
      <label>Payment Mode</label>
      <div class="radio-group">
        <label><input type="radio" name="outMode" value="Cash" checked> Cash</label>
        <label><input type="radio" name="outMode" value="Online"> Online</label>
      </div>
      <button class="btn-primary" id="saveOutBtn">Save Payment Out</button>
    </div>
  </div>

  <!-- DETAILS VIEW - upgraded professional -->
  <div id="detailsView" class="view">
    <div class="summary-card">
      <div style="font-weight: 500; font-size: 14px; color: #666;">Available Balance</div>
      <div class="balance-number" id="balanceAmount">₹0</div>
      <div class="total-row"><span>Total In</span><span id="totalInSpan">₹0</span></div>
      <div class="total-row"><span>Total Out</span><span id="totalOutSpan">₹0</span></div>
    </div>

    <div class="flex-row">
      <input type="text" id="searchInput" placeholder="🔍 Search by name or reason..." style="margin-bottom:0; flex:1;">
      <button class="btn-secondary" id="exportDataBtn">Export</button>
      <button class="btn-secondary" id="importDataBtn">Import</button>
    </div>
    <div class="flex-row">
      <button class="btn-secondary" id="backupFullBtn">Backup</button>
      <button class="btn-secondary" id="restoreFullBtn">Restore</button>
    </div>
    <p style="font-size: 12px; margin-bottom: 20px; color: #888;">Backup includes all data | Restore merges without duplicates</p>

    <div class="title-section">Transactions</div>
    <div id="transactionListContainer" class="txn-list">
      <div class="empty-state">✨ No transactions yet</div>
    </div>
    <div class="total-row" style="margin-top: 18px; font-weight: 600; border-top: 1px solid #eee; padding-top: 16px;">
      <span>Total In</span><span id="listTotalIn">₹0</span>
      <span>Total Out</span><span id="listTotalOut">₹0</span>
    </div>
  </div>
</div>

<div id="toastMsg" class="toast"></div>
<div id="modal" class="modal">
  <div class="modal-card">
    <h3 style="margin-bottom: 16px; font-size: 24px; font-weight: 600;">Transaction</h3>
    <div id="modalContent"></div>
    <div class="flex-row" style="margin-top: 24px;">
      <button class="btn-secondary" id="modalCloseBtn">Close</button>
      <button class="btn-primary" id="modalDeleteBtn" style="background:#FF6B4A;">Delete</button>
    </div>
  </div>
</div>

<script>
  // ---------- IndexedDB with robust error handling (same as before, works perfectly) ----------
  const DB_NAME = 'CashBookData';
  const STORE_TX = 'transactions';
  const STORE_SETTINGS = 'appSettings';
  let db = null;
  let dbInitPromise = null;

  function openDB() {
    if (dbInitPromise) return dbInitPromise;
    dbInitPromise = new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, 4);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => { db = request.result; resolve(db); };
      request.onupgradeneeded = (e) => {
        const dbRef = e.target.result;
        if (!dbRef.objectStoreNames.contains(STORE_TX)) {
          dbRef.createObjectStore(STORE_TX, { keyPath: 'id' });
        }
        if (!dbRef.objectStoreNames.contains(STORE_SETTINGS)) {
          dbRef.createObjectStore(STORE_SETTINGS, { keyPath: 'key' });
        }
      };
    });
    return dbInitPromise;
  }

  async function getSetting(key) {
    await openDB();
    const tx = db.transaction(STORE_SETTINGS, 'readonly');
    const store = tx.objectStore(STORE_SETTINGS);
    return new Promise((resolve) => {
      const req = store.get(key);
      req.onsuccess = () => resolve(req.result?.value);
      req.onerror = () => resolve(null);
    });
  }

  async function setSetting(key, value) {
    await openDB();
    const tx = db.transaction(STORE_SETTINGS, 'readwrite');
    const store = tx.objectStore(STORE_SETTINGS);
    return new Promise((resolve, reject) => {
      const req = store.put({ key, value });
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e);
    });
  }

  async function getAllTransactions() {
    await openDB();
    const tx = db.transaction(STORE_TX, 'readonly');
    const store = tx.objectStore(STORE_TX);
    return new Promise((resolve) => {
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    });
  }

  async function addTransaction(txn) {
    await openDB();
    const tx = db.transaction(STORE_TX, 'readwrite');
    const store = tx.objectStore(STORE_TX);
    return new Promise((resolve, reject) => {
      const req = store.add(txn);
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e);
    });
  }

  async function deleteTransaction(id) {
    await openDB();
    const tx = db.transaction(STORE_TX, 'readwrite');
    const store = tx.objectStore(STORE_TX);
    return new Promise((resolve, reject) => {
      const req = store.delete(id);
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e);
    });
  }

  async function clearAllTransactions() {
    await openDB();
    const tx = db.transaction(STORE_TX, 'readwrite');
    const store = tx.objectStore(STORE_TX);
    return new Promise((resolve, reject) => {
      const req = store.clear();
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e);
    });
  }

  function showToast(msg, duration = 2000) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, duration);
  }

  const views = ['welcomeView', 'dashboardView', 'paymentInView', 'paymentOutView', 'detailsView'];
  function showView(viewId) {
    views.forEach(v => document.getElementById(v).classList.remove('active-view'));
    document.getElementById(viewId).classList.add('active-view');
    const backBtn = document.getElementById('globalBackBtn');
    if (viewId === 'dashboardView' || viewId === 'welcomeView') backBtn.style.display = 'none';
    else backBtn.style.display = 'inline-flex';
  }

  function formatINR(amount) { return '₹' + amount.toFixed(2); }

  async function saveTransaction(type) {
    try {
      const isIn = type === 'in';
      const name = document.getElementById(isIn ? 'inName' : 'outName').value.trim();
      const amountRaw = document.getElementById(isIn ? 'inAmount' : 'outAmount').value;
      const reason = document.getElementById(isIn ? 'inReason' : 'outReason').value.trim();
      let date = document.getElementById(isIn ? 'inDate' : 'outDate').value;
      const modeRadio = document.querySelector(isIn ? 'input[name="inMode"]:checked' : 'input[name="outMode"]:checked');
      const mode = modeRadio ? modeRadio.value : 'Cash';
      if (!name) { showToast('Name is required'); return; }
      if (!amountRaw || parseFloat(amountRaw) <= 0) { showToast('Amount must be > 0'); return; }
      if (!date) date = new Date().toISOString().slice(0,10);
      const amount = parseFloat(amountRaw);
      const transaction = {
        id: Date.now() + '-' + Math.random().toString(36).substring(2,6),
        date: date,
        name: name,
        amount: amount,
        reason: reason || '',
        mode: mode,
        type: type === 'in' ? 'Payment In' : 'Payment Out',
        createdAt: new Date().toISOString()
      };
      await addTransaction(transaction);
      showToast(`${type === 'in' ? 'Payment In' : 'Payment Out'} saved`);
      if (isIn) {
        document.getElementById('inName').value = '';
        document.getElementById('inAmount').value = '';
        document.getElementById('inReason').value = '';
      } else {
        document.getElementById('outName').value = '';
        document.getElementById('outAmount').value = '';
        document.getElementById('outReason').value = '';
      }
      showView('dashboardView');
    } catch (err) {
      console.error(err);
      showToast('Save failed');
    }
  }

  async function renderDetailsView() {
    try {
      const transactions = await getAllTransactions();
      const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
      const filtered = transactions.filter(t => t.name.toLowerCase().includes(searchTerm) || t.reason.toLowerCase().includes(searchTerm));
      let totalIn = 0, totalOut = 0;
      filtered.forEach(t => { if(t.type === 'Payment In') totalIn += t.amount; else totalOut += t.amount; });
      const balance = totalIn - totalOut;
      document.getElementById('balanceAmount').innerText = formatINR(balance);
      document.getElementById('totalInSpan').innerHTML = formatINR(totalIn);
      document.getElementById('totalOutSpan').innerHTML = formatINR(totalOut);
      document.getElementById('listTotalIn').innerHTML = formatINR(totalIn);
      document.getElementById('listTotalOut').innerHTML = formatINR(totalOut);
      const container = document.getElementById('transactionListContainer');
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 No transactions yet</div>';
        return;
      }
      filtered.sort((a,b)=> new Date(b.date) - new Date(a.date));
      let html = '';
      for (const t of filtered) {
        const amountClass = t.type === 'Payment In' ? 'in' : 'out';
        const sign = t.type === 'Payment In' ? '+' : '−';
        html += `
          <div class="txn-item" data-id="${t.id}">
            <div class="txn-left">
              <div class="txn-name">${escapeHtml(t.name)}</div>
              <div class="txn-meta">
                <span>${t.date}</span>
                <span>${t.mode}</span>
                ${t.reason ? `<span>${escapeHtml(t.reason)}</span>` : ''}
              </div>
            </div>
            <div class="txn-amount ${amountClass}">${sign} ${formatINR(t.amount)}</div>
          </div>
        `;
      }
      container.innerHTML = html;
      document.querySelectorAll('.txn-item').forEach(row => {
        row.addEventListener('click', () => showModalById(row.dataset.id));
      });
    } catch (err) {
      console.error(err);
      document.getElementById('transactionListContainer').innerHTML = '<div class="empty-state">Error loading data</div>';
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function showModalById(id) {
    const transactions = await getAllTransactions();
    const txn = transactions.find(t => t.id === id);
    if (!txn) return;
    const modal = document.getElementById('modal');
    document.getElementById('modalContent').innerHTML = `
      <p><strong>Date</strong><br>${txn.date}</p>
      <p><strong>Name</strong><br>${escapeHtml(txn.name)}</p>
      <p><strong>Amount</strong><br>${formatINR(txn.amount)}</p>
      <p><strong>Reason</strong><br>${txn.reason ? escapeHtml(txn.reason) : '—'}</p>
      <p><strong>Mode</strong><br>${txn.mode}</p>
      <p><strong>Type</strong><br>${txn.type}</p>
    `;
    modal.style.display = 'flex';
    const closeModal = () => { modal.style.display = 'none'; };
    document.getElementById('modalCloseBtn').onclick = closeModal;
    document.getElementById('modalDeleteBtn').onclick = async () => {
      if (confirm('Delete this transaction?')) {
        await deleteTransaction(txn.id);
        showToast('Deleted');
        closeModal();
        if (document.getElementById('detailsView').classList.contains('active-view')) renderDetailsView();
      }
    };
  }

  // Attach event listeners
  document.getElementById('seeDetailsBtn')?.addEventListener('click', () => { renderDetailsView(); showView('detailsView'); });
  document.getElementById('paymentInBtn')?.addEventListener('click', () => { showView('paymentInView'); setDefaultDates(); document.getElementById('inName')?.focus(); });
  document.getElementById('paymentOutBtn')?.addEventListener('click', () => { showView('paymentOutView'); setDefaultDates(); document.getElementById('outName')?.focus(); });
  document.getElementById('globalBackBtn')?.addEventListener('click', () => { showView('dashboardView'); });
  document.getElementById('saveInBtn')?.addEventListener('click', () => saveTransaction('in'));
  document.getElementById('saveOutBtn')?.addEventListener('click', () => saveTransaction('out'));
  document.getElementById('exportDataBtn')?.addEventListener('click', async () => {
    const txns = await getAllTransactions();
    const dataStr = JSON.stringify(txns, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = `cashbook_export_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Exported');
  });
  document.getElementById('importDataBtn')?.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        const imported = JSON.parse(text);
        if (Array.isArray(imported) && imported.every(t => t.id && t.amount && t.type)) {
          if (confirm('Replace all existing transactions?')) {
            await clearAllTransactions();
            for (const t of imported) await addTransaction(t);
            showToast('Import successful');
            if (document.getElementById('detailsView').classList.contains('active-view')) renderDetailsView();
          }
        } else throw new Error();
      } catch(e) { showToast('Invalid JSON'); }
    };
    input.click();
  });
  document.getElementById('backupFullBtn')?.addEventListener('click', async () => {
    const userName = await getSetting('userName') || 'User';
    const transactions = await getAllTransactions();
    const backupObj = { userName, backupDate: new Date().toISOString().slice(0,10), transactions, version: 1 };
    const blob = new Blob([JSON.stringify(backupObj, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = `CashBook_Backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Backup created');
  });
  document.getElementById('restoreFullBtn')?.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        const backup = JSON.parse(text);
        if (!backup.transactions || !Array.isArray(backup.transactions)) throw new Error();
        if (confirm('Restore backup (merge with existing)?')) {
          const existingTx = await getAllTransactions();
          const existingIds = new Set(existingTx.map(t => t.id));
          let added = 0;
          for (const t of backup.transactions) {
            if (t.id && t.amount && t.type && !existingIds.has(t.id)) {
              await addTransaction(t);
              added++;
            }
          }
          if (backup.userName && !(await getSetting('userName'))) {
            await setSetting('userName', backup.userName);
          }
          showToast(`Restored: ${added} new records`);
          if (document.getElementById('detailsView').classList.contains('active-view')) renderDetailsView();
        }
      } catch(e) { showToast('Invalid backup file'); }
    };
    input.click();
  });
  document.getElementById('searchInput')?.addEventListener('input', () => renderDetailsView());
  document.getElementById('continueBtn')?.addEventListener('click', async () => {
    const name = document.getElementById('userNameInput').value.trim();
    if (!name) { showToast('Name required'); return; }
    await setSetting('userName', name);
    showToast(`Welcome, ${name}`);
    showView('dashboardView');
  });

  function setDefaultDates() {
    const today = new Date().toISOString().slice(0,10);
    if (document.getElementById('inDate') && !document.getElementById('inDate').value) document.getElementById('inDate').value = today;
    if (document.getElementById('outDate') && !document.getElementById('outDate').value) document.getElementById('outDate').value = today;
  }

  async function initApp() {
    await openDB();
    const savedName = await getSetting('userName');
    if (savedName && savedName.trim() !== '') showView('dashboardView');
    else showView('welcomeView');
    setDefaultDates();
  }
  window.onclick = (e) => { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
  initApp();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/tools/service-worker.js')
      .then(reg => console.log('SW registered', reg))
      .catch(err => console.log('SW failed', err));
  }
</script>
</body>
