<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Simple Cash Book</title>
  <link rel="manifest" href="/tools/manifest.json">
  <meta name="theme-color" content="#4f83cc">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; color: #1e2a3e; padding: 16px; min-height: 100vh; }
    .app-container { max-width: 600px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); overflow: hidden; min-height: 85vh; }
    .header { background: white; padding: 20px 20px 12px 20px; border-bottom: 1px solid #eef2f6; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 1.65rem; font-weight: 600; background: linear-gradient(135deg, #1e3c72, #4f83cc); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .back-btn { background: #f0f4f9; border: none; font-size: 1.4rem; width: 40px; height: 40px; border-radius: 30px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
    .back-btn:active { background: #e0e6ed; transform: scale(0.96);}
    .spacer { flex:1; }
    .view { padding: 24px 20px 32px; display: none; animation: fadeIn 0.2s ease; }
    .active-view { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }
    .card { background: #ffffff; border-radius: 28px; padding: 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.03), 0 0 0 1px rgba(0,0,0,0.02); margin-bottom: 20px; }
    .dashboard-buttons { display: flex; flex-direction: column; gap: 18px; margin-top: 20px; }
    .btn-large { background: white; border: 1px solid #e2e8f0; padding: 18px 12px; border-radius: 60px; font-size: 1.35rem; font-weight: 600; text-align: center; cursor: pointer; background: #fafcff; color: #1e3c72; }
    .btn-large:active { background: #eef2ff; transform: scale(0.98); }
    .btn-primary { background: #4f83cc; border: none; color: white; padding: 14px 20px; border-radius: 50px; font-weight: 600; font-size: 1rem; cursor: pointer; width: 100%; }
    .btn-primary:active { background: #3a6bb0; transform: scale(0.97);}
    .btn-secondary { background: #f1f5f9; color: #1e2a3e; border: none; padding: 12px 16px; border-radius: 40px; font-weight: 500; cursor: pointer; }
    .flex-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
    input, select { width: 100%; padding: 14px 16px; border-radius: 28px; border: 1px solid #e2edf2; background: white; font-size: 1rem; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #4f83cc; box-shadow: 0 0 0 3px rgba(79,131,204,0.2); }
    label { font-weight: 500; margin-bottom: 6px; display: inline-block; font-size: 0.9rem; color: #2d3e5f; }
    .radio-group { display: flex; gap: 24px; align-items: center; margin-bottom: 20px; }
    .radio-group label { display: flex; align-items: center; gap: 8px; font-weight: normal; }
    .summary-card { background: linear-gradient(135deg, #eef5ff, #ffffff); border-radius: 32px; padding: 18px; text-align: center; margin-bottom: 24px; }
    .balance-number { font-size: 2.6rem; font-weight: 800; color: #1e3c72; }
    .total-row { display: flex; justify-content: space-between; margin-top: 12px; font-weight: 500; }
    .txn-list { margin-top: 18px; max-height: 420px; overflow-y: auto; border-radius: 24px; }
    .txn-row { display: flex; justify-content: space-between; align-items: center; background: #fefefe; border-bottom: 1px solid #edf2f7; padding: 14px 8px; cursor: pointer; }
    .txn-in { color: #2b7e3a; font-weight: 700; }
    .txn-out { color: #c2412c; font-weight: 700; }
    .txn-date { font-size: 0.75rem; color: #5c6f87; }
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1e2a3e; color: white; padding: 10px 22px; border-radius: 60px; font-size: 0.9rem; z-index: 1000; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1100; backdrop-filter: blur(3px); }
    .modal-card { background: white; max-width: 90%; width: 340px; border-radius: 36px; padding: 24px; }
    .empty-state { text-align: center; padding: 40px 20px; color: #7e8c9e; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <button class="back-btn" id="globalBackBtn" style="display: none;">←</button>
    <h1>Simple Cash Book</h1>
    <div class="spacer"></div>
  </div>

  <div id="welcomeView" class="view">
    <div class="card">
      <label>Enter Your Name</label>
      <input type="text" id="userNameInput" placeholder="e.g., Deepak Sharma" autocomplete="off">
      <button class="btn-primary" id="continueBtn">Continue</button>
    </div>
  </div>

  <div id="dashboardView" class="view">
    <div class="dashboard-buttons">
      <button class="btn-large" id="seeDetailsBtn">📊 See Details</button>
      <button class="btn-large" id="paymentInBtn">💰 Payment In</button>
      <button class="btn-large" id="paymentOutBtn">💸 Payment Out</button>
    </div>
  </div>

  <div id="paymentInView" class="view">
    <div class="card">
      <label>Date</label>
      <input type="date" id="inDate">
      <label>Name *</label>
      <input type="text" id="inName" placeholder="Person / Entity">
      <label>Amount * (₹)</label>
      <input type="number" id="inAmount" step="0.01" min="0.01">
      <label>Reason (Optional)</label>
      <input type="text" id="inReason" placeholder="Reason">
      <label>Payment Mode</label>
      <div class="radio-group">
        <label><input type="radio" name="inMode" value="Cash" checked> Cash</label>
        <label><input type="radio" name="inMode" value="Online"> Online</label>
      </div>
      <button class="btn-primary" id="saveInBtn">✅ Save Payment In</button>
    </div>
  </div>

  <div id="paymentOutView" class="view">
    <div class="card">
      <label>Date</label>
      <input type="date" id="outDate">
      <label>Name *</label>
      <input type="text" id="outName">
      <label>Amount * (₹)</label>
      <input type="number" id="outAmount" step="0.01" min="0.01">
      <label>Reason (Optional)</label>
      <input type="text" id="outReason">
      <label>Payment Mode</label>
      <div class="radio-group">
        <label><input type="radio" name="outMode" value="Cash" checked> Cash</label>
        <label><input type="radio" name="outMode" value="Online"> Online</label>
      </div>
      <button class="btn-primary" id="saveOutBtn">📉 Save Payment Out</button>
    </div>
  </div>

  <div id="detailsView" class="view">
    <div class="summary-card">
      <div style="font-weight: 500;">Available Balance</div>
      <div class="balance-number" id="balanceAmount">₹0</div>
      <div class="total-row"><span>Total In:</span><span id="totalInSpan">₹0</span></div>
      <div class="total-row"><span>Total Out:</span><span id="totalOutSpan">₹0</span></div>
    </div>
    <div class="flex-row">
      <input type="text" id="searchInput" placeholder="🔍 Search by name or reason..." style="margin-bottom:0; flex:1;">
      <button class="btn-secondary" id="exportDataBtn">📎 Export</button>
      <button class="btn-secondary" id="importDataBtn">📂 Import</button>
    </div>
    <div class="flex-row">
      <button class="btn-secondary" id="backupFullBtn">💾 Backup Data</button>
      <button class="btn-secondary" id="restoreFullBtn">🔄 Restore Data</button>
    </div>
    <p style="font-size: 0.7rem; margin-bottom:12px; color:#5f7f9e;">Backup includes name + transactions | Restore merges with duplicate check</p>
    <div class="txn-list" id="transactionListContainer">
      <div class="empty-state">✨ No transactions yet</div>
    </div>
    <div class="total-row" style="margin-top: 12px; font-weight: 600;">
      <span>Total In:</span><span id="listTotalIn">₹0</span>
      <span>Total Out:</span><span id="listTotalOut">₹0</span>
    </div>
  </div>
</div>
<div id="toastMsg" class="toast"></div>
<div id="modal" class="modal">
  <div class="modal-card">
    <h3>Transaction</h3>
    <div id="modalContent"></div>
    <div class="flex-row" style="margin-top: 20px;">
      <button class="btn-secondary" id="modalCloseBtn">Close</button>
      <button class="btn-primary" id="modalDeleteBtn" style="background:#c2412c;">Delete</button>
    </div>
  </div>
</div>

<script>
  // ---------- ROBUST INDEXEDDB ----------
  const DB_NAME = 'CashBookData';
  const STORE_TX = 'transactions';
  const STORE_SETTINGS = 'appSettings';
  let db = null;
  let dbInitPromise = null;

  function openDB() {
    if (dbInitPromise) return dbInitPromise;
    dbInitPromise = new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, 4);
      request.onerror = (e) => {
        console.error('IndexedDB error:', e);
        showToast('Storage error! Please clear site data and reload.', 3000);
        reject(request.error);
      };
      request.onsuccess = () => {
        db = request.result;
        console.log('DB opened successfully');
        resolve(db);
      };
      request.onupgradeneeded = (e) => {
        const dbRef = e.target.result;
        if (!dbRef.objectStoreNames.contains(STORE_TX)) {
          dbRef.createObjectStore(STORE_TX, { keyPath: 'id' });
        }
        if (!dbRef.objectStoreNames.contains(STORE_SETTINGS)) {
          dbRef.createObjectStore(STORE_SETTINGS, { keyPath: 'key' });
        }
        console.log('DB upgrade done');
      };
    });
    return dbInitPromise;
  }

  async function getSetting(key) {
    await openDB();
    const tx = db.transaction(STORE_SETTINGS, 'readonly');
    const store = tx.objectStore(STORE_SETTINGS);
    return new Promise((resolve) => {
      const req = store.get(key);
      req.onsuccess = () => resolve(req.result?.value);
      req.onerror = () => resolve(null);
    });
  }

  async function setSetting(key, value) {
    await openDB();
    const tx = db.transaction(STORE_SETTINGS, 'readwrite');
    const store = tx.objectStore(STORE_SETTINGS);
    return new Promise((resolve, reject) => {
      const req = store.put({ key, value });
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e);
    });
  }

  async function getAllTransactions() {
    await openDB();
    const tx = db.transaction(STORE_TX, 'readonly');
    const store = tx.objectStore(STORE_TX);
    return new Promise((resolve) => {
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    });
  }

  async function addTransaction(txn) {
    await openDB();
    const tx = db.transaction(STORE_TX, 'readwrite');
    const store = tx.objectStore(STORE_TX);
    return new Promise((resolve, reject) => {
      const req = store.add(txn);
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e);
    });
  }

  async function deleteTransaction(id) {
    await openDB();
    const tx = db.transaction(STORE_TX, 'readwrite');
    const store = tx.objectStore(STORE_TX);
    return new Promise((resolve, reject) => {
      const req = store.delete(id);
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e);
    });
  }

  async function clearAllTransactions() {
    await openDB();
    const tx = db.transaction(STORE_TX, 'readwrite');
    const store = tx.objectStore(STORE_TX);
    return new Promise((resolve, reject) => {
      const req = store.clear();
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e);
    });
  }

  function showToast(msg, duration = 2000) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, duration);
  }

  // Navigation
  const views = ['welcomeView', 'dashboardView', 'paymentInView', 'paymentOutView', 'detailsView'];
  function showView(viewId) {
    views.forEach(v => document.getElementById(v).classList.remove('active-view'));
    document.getElementById(viewId).classList.add('active-view');
    const backBtn = document.getElementById('globalBackBtn');
    if (viewId === 'dashboardView' || viewId === 'welcomeView') backBtn.style.display = 'none';
    else backBtn.style.display = 'inline-flex';
  }

  function formatINR(amount) { return '₹' + amount.toFixed(2); }

  async function saveTransaction(type) {
    try {
      const isIn = type === 'in';
      const name = document.getElementById(isIn ? 'inName' : 'outName').value.trim();
      const amountRaw = document.getElementById(isIn ? 'inAmount' : 'outAmount').value;
      const reason = document.getElementById(isIn ? 'inReason' : 'outReason').value.trim();
      let date = document.getElementById(isIn ? 'inDate' : 'outDate').value;
      const modeRadio = document.querySelector(isIn ? 'input[name="inMode"]:checked' : 'input[name="outMode"]:checked');
      const mode = modeRadio ? modeRadio.value : 'Cash';
      if (!name) { showToast('Name is required'); return; }
      if (!amountRaw || parseFloat(amountRaw) <= 0) { showToast('Amount must be > 0'); return; }
      if (!date) date = new Date().toISOString().slice(0,10);
      const amount = parseFloat(amountRaw);
      const transaction = {
        id: Date.now() + '-' + Math.random().toString(36).substring(2,6),
        date: date,
        name: name,
        amount: amount,
        reason: reason || '',
        mode: mode,
        type: type === 'in' ? 'Payment In' : 'Payment Out',
        createdAt: new Date().toISOString()
      };
      await addTransaction(transaction);
      showToast(`${type === 'in' ? 'Payment In' : 'Payment Out'} saved!`);
      // Clear fields
      if (isIn) document.getElementById('inName').value = '';
      else document.getElementById('outName').value = '';
      document.getElementById(isIn ? 'inAmount' : 'outAmount').value = '';
      document.getElementById(isIn ? 'inReason' : 'outReason').value = '';
      showView('dashboardView');
    } catch (err) {
      console.error('Save error:', err);
      showToast('Save failed! Check storage permissions.');
    }
  }

  async function renderDetailsView() {
    try {
      const transactions = await getAllTransactions();
      const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
      const filtered = transactions.filter(t => t.name.toLowerCase().includes(searchTerm) || t.reason.toLowerCase().includes(searchTerm));
      let totalIn = 0, totalOut = 0;
      filtered.forEach(t => { if(t.type === 'Payment In') totalIn += t.amount; else totalOut += t.amount; });
      const balance = totalIn - totalOut;
      document.getElementById('balanceAmount').innerText = formatINR(balance);
      document.getElementById('totalInSpan').innerHTML = formatINR(totalIn);
      document.getElementById('totalOutSpan').innerHTML = formatINR(totalOut);
      document.getElementById('listTotalIn').innerHTML = formatINR(totalIn);
      document.getElementById('listTotalOut').innerHTML = formatINR(totalOut);
      const container = document.getElementById('transactionListContainer');
      if (filtered.length === 0) { container.innerHTML = '<div class="empty-state">📭 No transactions yet. Add some!</div>'; return; }
      filtered.sort((a,b)=> new Date(b.date) - new Date(a.date));
      let html = `<div style="display:grid; grid-template-columns: 1fr 1fr; font-weight:600; padding:8px 0; border-bottom:1px solid #eef2f6;"><span>Payment In</span><span>Payment Out</span></div>`;
      for (const t of filtered) {
        const inDisplay = t.type === 'Payment In' ? `<div class="txn-in">+ ${formatINR(t.amount)}</div><div class="txn-date">${t.date} · ${t.name}</div>` : '<div></div>';
        const outDisplay = t.type === 'Payment Out' ? `<div class="txn-out">- ${formatINR(t.amount)}</div><div class="txn-date">${t.date} · ${t.name}</div>` : '<div></div>';
        html += `<div class="txn-row" data-id="${t.id}"><div>${inDisplay}</div><div style="text-align:right;">${outDisplay}</div></div>`;
      }
      container.innerHTML = html;
      document.querySelectorAll('.txn-row').forEach(row => {
        row.addEventListener('click', () => { const id = row.dataset.id; showModalById(id); });
      });
    } catch (err) {
      console.error('Render error:', err);
      document.getElementById('transactionListContainer').innerHTML = '<div class="empty-state">Error loading data. Please refresh.</div>';
    }
  }

  async function showModalById(id) {
    const transactions = await getAllTransactions();
    const txn = transactions.find(t => t.id === id);
    if (!txn) return;
    const modal = document.getElementById('modal');
    document.getElementById('modalContent').innerHTML = `
      <p><strong>Date:</strong> ${txn.date}</p>
      <p><strong>Name:</strong> ${txn.name}</p>
      <p><strong>Amount:</strong> ${formatINR(txn.amount)}</p>
      <p><strong>Reason:</strong> ${txn.reason || '—'}</p>
      <p><strong>Mode:</strong> ${txn.mode}</p>
      <p><strong>Type:</strong> ${txn.type}</p>
    `;
    modal.style.display = 'flex';
    const closeModal = () => { modal.style.display = 'none'; };
    document.getElementById('modalCloseBtn').onclick = closeModal;
    document.getElementById('modalDeleteBtn').onclick = async () => {
      if (confirm('Delete this transaction?')) {
        await deleteTransaction(txn.id);
        showToast('Deleted');
        closeModal();
        if (document.getElementById('detailsView').classList.contains('active-view')) renderDetailsView();
      }
    };
  }

  // Event listeners
  document.getElementById('seeDetailsBtn')?.addEventListener('click', () => { renderDetailsView(); showView('detailsView'); });
  document.getElementById('paymentInBtn')?.addEventListener('click', () => { showView('paymentInView'); setDefaultDates(); document.getElementById('inName')?.focus(); });
  document.getElementById('paymentOutBtn')?.addEventListener('click', () => { showView('paymentOutView'); setDefaultDates(); document.getElementById('outName')?.focus(); });
  document.getElementById('globalBackBtn')?.addEventListener('click', () => { showView('dashboardView'); });
  document.getElementById('saveInBtn')?.addEventListener('click', () => saveTransaction('in'));
  document.getElementById('saveOutBtn')?.addEventListener('click', () => saveTransaction('out'));
  document.getElementById('exportDataBtn')?.addEventListener('click', async () => {
    const txns = await getAllTransactions();
    const dataStr = JSON.stringify(txns, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = `cashbook_export_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Exported transactions');
  });
  document.getElementById('importDataBtn')?.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        const imported = JSON.parse(text);
        if (Array.isArray(imported) && imported.every(t => t.id && t.amount && t.type)) {
          if (confirm('Import will REPLACE all existing transactions. Continue?')) {
            await clearAllTransactions();
            for (const t of imported) await addTransaction(t);
            showToast('Import successful');
            if (document.getElementById('detailsView').classList.contains('active-view')) renderDetailsView();
          }
        } else throw new Error();
      } catch(e) { showToast('Invalid JSON format'); }
    };
    input.click();
  });
  document.getElementById('backupFullBtn')?.addEventListener('click', async () => {
    const userName = await getSetting('userName') || 'User';
    const transactions = await getAllTransactions();
    const backupObj = { userName, backupDate: new Date().toISOString().slice(0,10), transactions, version: 1 };
    const blob = new Blob([JSON.stringify(backupObj, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = `CashBook_Backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Backup created successfully.');
  });
  document.getElementById('restoreFullBtn')?.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        const backup = JSON.parse(text);
        if (!backup.transactions || !Array.isArray(backup.transactions)) throw new Error();
        if (confirm('Restoring backup will merge with existing records. Continue?')) {
          const existingTx = await getAllTransactions();
          const existingIds = new Set(existingTx.map(t => t.id));
          let mergedCount = 0;
          for (const t of backup.transactions) {
            if (t.id && t.amount && t.type && !existingIds.has(t.id)) {
              await addTransaction(t);
              mergedCount++;
            }
          }
          if (backup.userName && !(await getSetting('userName'))) {
            await setSetting('userName', backup.userName);
          }
          showToast(`Data restored successfully. Added ${mergedCount} new records.`);
          if (document.getElementById('detailsView').classList.contains('active-view')) renderDetailsView();
        }
      } catch(e) { showToast('Invalid backup file'); }
    };
    input.click();
  });
  document.getElementById('searchInput')?.addEventListener('input', () => renderDetailsView());
  document.getElementById('continueBtn')?.addEventListener('click', async () => {
    const name = document.getElementById('userNameInput').value.trim();
    if (!name) { showToast('Name is required'); return; }
    try {
      await setSetting('userName', name);
      showToast(`Welcome, ${name}`);
      showView('dashboardView');
    } catch (err) {
      showToast('Failed to save name. Storage error.');
    }
  });

  function setDefaultDates() {
    const today = new Date().toISOString().slice(0,10);
    if (document.getElementById('inDate') && !document.getElementById('inDate').value) document.getElementById('inDate').value = today;
    if (document.getElementById('outDate') && !document.getElementById('outDate').value) document.getElementById('outDate').value = today;
  }

  async function initApp() {
    try {
      await openDB();
      const savedName = await getSetting('userName');
      if (savedName && savedName.trim() !== '') {
        showView('dashboardView');
      } else {
        showView('welcomeView');
      }
      setDefaultDates();
    } catch (err) {
      console.error('Init error:', err);
      showToast('Storage not available. Try reinstalling app.');
    }
  }
  window.onclick = (e) => { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
  initApp();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/tools/service-worker.js')
      .then(reg => console.log('SW registered', reg))
      .catch(err => console.log('SW failed', err));
  }
</script>
</body>
</html>
